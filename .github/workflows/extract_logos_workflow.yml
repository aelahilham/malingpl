# Simpan file ini di repo kamu dengan path:
# .github/workflows/extract_logos.yml
#
# Cara pakai:
# 1. Push file ini ke repo GitHub kamu
# 2. Buka tab "Actions" di repo GitHub
# 3. Klik "Extract Logos from Playlist"
# 4. Klik "Run workflow" -> "Run workflow"
# 5. Tunggu selesai (~1 menit)
# 6. Logo otomatis ter-commit ke repo dan Vercel langsung redeploy

name: Extract Logos from Playlist

on:
  workflow_dispatch:  # Jalankan manual dari tab Actions

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Izin untuk commit ke repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Extract logos
        run: python3 extract_logos.py

      - name: Commit dan push logos
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logos/
          git diff --staged --quiet || git commit -m "Auto: extract logo PNG dari malingenak.m3u"
          git push
